name: Windows build

on:
  workflow_dispatch:
  push:
    branches:
      - windows-ci   # temporary: auto-run while testing the CI on this branch
    tags:
      - 'v*'

jobs:
  windows-mingw:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the Release on tag pushes
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 / MINGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-portaudio

      - name: qmake
        run: |
          mkdir -p build && cd build
          # MSYS2 ships a bleeding-edge GCC whose -Wsfinae-incomplete fires
          # *inside* Qt6's own headers (QHash/QChar); the project's -Werror
          # would turn that into a hard error. Demote just that diagnostic
          # (appended after -Werror so it wins) — our code is still -Werror.
          qmake6 ../Cadence.pro QMAKE_CXXFLAGS+=-Wno-error=sfinae-incomplete

      - name: Build
        run: |
          cd build
          mingw32-make -j$(nproc)

      - name: Bundle exe + Qt/runtime DLLs
        run: |
          cd build
          # qmake on win32-g++ may emit into ./ , ./release or ./debug
          EXE=$(find . -name cadence.exe | head -1)
          if [ -z "$EXE" ]; then echo "cadence.exe not found"; find . -name '*.exe'; exit 1; fi
          echo "Found exe at $EXE"
          mkdir -p dist
          cp "$EXE" dist/
          windeployqt6 --release --no-translations --no-system-d3d-compiler dist/cadence.exe
          # Copy non-Qt DLLs windeployqt won't: PortAudio + the MinGW C/C++
          # runtime. Without the latter the exe won't start on a clean Windows
          # box (no MSYS2 installed).
          BIN="$(cygpath -u "$MINGW_PREFIX")/bin"
          cp "$BIN/libportaudio.dll" dist/
          cp "$BIN/libgcc_s_seh-1.dll" dist/
          cp "$BIN/libstdc++-6.dll" dist/
          cp "$BIN/libwinpthread-1.dll" dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cadence-windows-x64
          path: build/dist
          if-no-files-found: error

      - name: Package zip for release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: Compress-Archive -Path build/dist/* -DestinationPath cadence-windows-x64.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cadence-windows-x64.zip
          fail_on_unmatched_files: true
          prerelease: true
          name: Cadence ${{ github.ref_name }} — Windows (test build)
          body: |
            Unofficial Windows x64 build of Cadence, cross-built under MSYS2/MINGW64.

            **Download `cadence-windows-x64.zip`**, unzip, and run `cadence.exe`
            (self-contained — Qt6 + PortAudio + MinGW runtime DLLs are bundled).

            ⚠️ Test build, not yet verified on real Windows. Known issue: the
            keyboard mapping still uses the X11 layout, so many keys will be
            wrong until a Windows scan-code table is added.
